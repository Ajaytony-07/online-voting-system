<!DOCTYPE html>
<html>
<head>
    <title>Online Voting System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Online Voting System</h2>

<form id="voteForm">
    <input type="radio" name="candidate" value="A"> Candidate A <br>
    <input type="radio" name="candidate" value="B"> Candidate B <br>
    <input type="radio" name="candidate" value="C"> Candidate C <br><br>

    <button type="submit">Vote</button>
    <button type="button" onclick="resetVotes()">Reset</button>
</form>

<h3 id="message"></h3>

<div id="results">
    <h3>Results:</h3>
    <p>A: <span id="countA">0</span></p>
    <p>B: <span id="countB">0</span></p>
    <p>C: <span id="countC">0</span></p>
</div>

<script src="script.js"></script>
</body>
</html>
